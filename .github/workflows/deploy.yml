name: Build and Publish to itch.io

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allows you to manually trigger the workflow from the GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build WebAssembly (WASM)
        run: |
          echo "Building the game for WebAssembly..."
          GOOS=js GOARCH=wasm go build -o 7colors.wasm .
          
          echo "Copying wasm_exec.js..."
          go run github.com/hajimehoshi/ebiten/v2/cmd/wasm_exec@latest > wasm_exec.js

      - name: Prepare HTML5 ZIP package
        run: |
          mkdir -p build/web
          
          # Copy all required web files into the build folder
          cp index.html wasm_exec.js 7colors.wasm build/web/
          
          # If you add an 'assets' folder in the future, uncomment the following line:
          # cp -r assets build/web/
          
          cd build/web
          zip -r ../html5-build.zip .

      - name: Download itch.io Butler
        run: |
          # Downloading the official itch.io butler CLI tool
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Publish to itch.io
        env:
          # Ensure your GitHub secret is named exactly BUTLER_API_KEY or ITCHIO_API_KEY
          # We check both commonly used names.
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY || secrets.ITCHIO_API_KEY }}
        run: |
          # Fetch the variables you configured in GitHub
          USERNAME="${{ vars.ITCHIO_USERNAME || vars.ITCH_USERNAME }}"
          GAME_ID="${{ vars.ITCHIO_GAME_ID || vars.ITCH_GAME_ID }}"
          
          if [ -z "$USERNAME" ] || [ -z "$GAME_ID" ]; then
            echo "Error: ITCHIO_USERNAME or ITCHIO_GAME_ID is missing from GitHub Variables!"
            exit 1
          fi
          
          echo "Pushing to itch.io -> $USERNAME/$GAME_ID"
          
          # Push the zip file to your game page's HTML5 channel
          ./butler push build/html5-build.zip "$USERNAME/$GAME_ID:html5"
